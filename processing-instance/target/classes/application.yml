server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: processing-instance
  datasource:
    url: jdbc:h2:mem:bankingdb_${INSTANCE_ID:instance-1}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

instance:
  id: ${INSTANCE_ID:instance-1}
  # Latența simulată de procesare (diferă per instanță via env)
  base-processing-ms: ${BASE_PROCESSING_MS:100}
  jitter-ms: ${JITTER_MS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
