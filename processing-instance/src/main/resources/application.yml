server:
  port: ${SERVER_PORT}
  servlet:
    context-path: /api

spring:
  application:
    name: processing-instance
  datasource:
    url: jdbc:h2:mem:bankingdb_${INSTANCE_ID}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console



instance:
  id: ${INSTANCE_ID}
  base-processing-ms: ${BASE_PROCESSING_MS}
  jitter-ms: ${JITTER_MS}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
